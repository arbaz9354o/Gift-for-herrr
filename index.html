<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise 🎂</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700;800&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
width: 100%;
max-width: 100%;
overflow-x: hidden;
}
:root {
--safe-bottom: env(safe-area-inset-bottom, 0px);
}

body {
font-family: 'Nunito', sans-serif;
min-height: 100vh;
min-height: 100dvh;
overflow: hidden;
background: #1a1a2e;
position: relative;
}

/* ===== SCREENS ===== */
.screen {
display: none;
width: 100%;
min-height: 100vh;
min-height: 100dvh;
height: 100vh;
height: 100dvh;
position: absolute;
top: 0; left: 0;
animation: fadeIn 0.5s ease;
overflow-x: hidden;
overflow-y: auto;
-webkit-overflow-scrolling: touch;
}
.screen.active { display: flex; }

@keyframes fadeIn {
from { opacity: 0; transform: scale(0.97); }
to { opacity: 1; transform: scale(1); }
}

/* ===== SCREEN 1 – PASSCODE ===== */
#s1 {
background: #3040b0;
flex-direction: row;
align-items: center;
justify-content: space-around;
padding: 30px;
gap: 20px;
}
.photo-frame {
background: white;
padding: 10px 10px 30px;
border-radius: 4px;
box-shadow: 0 10px 30px rgba(0,0,0,0.4);
transform: rotate(-3deg);
max-width: 280px;
position: relative;
}
.photo-frame img {
width: 100%;
height: 220px;
object-fit: cover;
display: block;
}
.photo-placeholder {
width: 260px;
height: 220px;
background: linear-gradient(135deg, #667eea, #764ba2);
display: flex;
align-items: center;
justify-content: center;
font-size: 40px;
}
.bear-sticker {
position: absolute;
bottom: -20px;
left: -15px;
font-size: 50px;
}
.bow-sticker {
position: absolute;
top: -18px;
right: 20px;
font-size: 36px;
}

.passcode-panel {
display: flex;
flex-direction: column;
align-items: center;
gap: 16px;
width: min(100%, 360px);
}
.passcode-panel h2 {
color: white;
font-size: 1.3rem;
font-weight: 700;
letter-spacing: 1px;
}
.code-display {
display: flex;
gap: 10px;
}
.code-box {
width: 46px; height: 46px;
background: rgba(255,255,255,0.15);
border: 2px solid rgba(255,255,255,0.5);
border-radius: 8px;
display: flex; align-items: center; justify-content: center;
font-size: 1.5rem; color: white; font-weight: 800;
transition: all 0.2s;
}
.code-box.filled { background: rgba(255,255,255,0.3); border-color: white; }

.numpad {
display: grid;
grid-template-columns: repeat(3, 60px);
gap: 10px;
justify-content: center;
}
.num-btn {
width: 60px; height: 60px;
border-radius: 50%;
border: none;
background: rgba(255,255,255,0.2);
color: white;
font-size: 1.3rem;
font-weight: 700;
cursor: pointer;
transition: all 0.15s;
backdrop-filter: blur(4px);
}
.num-btn:hover { background: rgba(255,255,255,0.35); transform: scale(1.08); }
.num-btn:active { transform: scale(0.95); }
.num-btn.special { font-size: 1rem; }

.hint-msg {
color: rgba(255,255,255,0.75);
font-size: 0.82rem;
font-weight: 600;
text-align: center;
background: rgba(255,255,255,0.12);
border: 1px dashed rgba(255,255,255,0.35);
border-radius: 20px;
padding: 7px 16px;
max-width: 240px;
line-height: 1.4;
backdrop-filter: blur(4px);
animation: hintPulse 2.5s ease-in-out infinite;
}
.hint-msg em {
color: #ffd6e0;
font-style: italic;
font-weight: 700;
}
@keyframes hintPulse {
0%, 100% { opacity: 0.75; }
50% { opacity: 1; }
}
.error-msg {
color: #ff6b6b;
font-weight: 700;
font-size: 0.9rem;
min-height: 20px;
text-align: center;
}
.brand { color: rgba(255,255,255,0.35); font-size: 0.75rem; margin-top: 4px; }

/* ===== SCREEN 2 – HAPPY BIRTHDAY ===== */
#s2 {
background: #e8f4fd;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 20px;
padding: 30px;
}
#s2 .gif-area {
width: 240px; height: 240px;
background: linear-gradient(135deg, #e8f4fd, #e8f4fd);
border-radius: 16px;
display: flex; align-items: center; justify-content: center;
font-size: 5rem;
position: relative;
overflow: hidden;
}
#s2 .gif-area img { width: 100%; height: 100%; object-fit: cover; border-radius: 16px; }
#s2 .gif-placeholder { font-size: 4rem; }
.s2-inner {
position: relative;
width: 100%;
height: 100%;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 24px;
padding: 30px;
background: #fff8f0;
}

/* ===== SCREEN 3 – ARE YOU READY ===== */
#s3 {
background: #e8f4fd;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 24px;
padding: 30px;
}
#s3 h1 {
font-family: 'Pacifico', cursive;
font-size: 2rem;
color: #5b6abf;
text-align: center;
line-height: 1.3;
}
.bear-gif-area {
width: 200px; height: 200px;
background: linear-gradient(135deg, #e3f2fd, #bbdefb);
border-radius: 50%;
display: flex; align-items: center; justify-content: center;
font-size: 5rem;
box-shadow: 0 8px 30px rgba(91,106,191,0.2);
}
.bear-gif-img,
.angry-gif-img {
width: min(300px, 72vw);
height: auto;
}
.btn-row { display: flex; gap: 16px; }

/* ===== SCREEN 4 – HOW DARE YOU ===== */
#s4 {
background: #e8f4fd;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 24px;
padding: 30px;
}
#s4 h1 {
font-family: 'Nunito', sans-serif;
font-size: 2.5rem;
font-weight: 900;
color: #3040b0;
text-align: center;
text-transform: uppercase;
letter-spacing: 2px;
}
.angry-gif-area {
width: 200px; height: 200px;
display: flex; align-items: center; justify-content: center;
font-size: 5rem;
}

/* ===== SCREEN 6 – GIFT FOR YOU ===== */
#s6 {
background: #fff8f0;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 28px;
padding: 30px;
}
#s6 h1 {
font-family: 'Dancing Script', cursive;
font-size: 3.8rem;
color: #6f285c;
text-shadow: 2px 2px 0 rgba(0,0,0,0.08);
}
.gifts-row {
display: flex;
gap: 20px;
align-items: center;
}
.gift-box {
width: 150px; height: 150px;
background: transparent;
border-radius: 0;
display: flex; align-items: center; justify-content: center;
cursor: pointer;
box-shadow: none;
transition: all 0.2s;
position: relative;
overflow: visible;
font-size: 5rem; /* Fallback icon size */
}
.gift-box:hover { transform: translateY(-10px) scale(1.08); filter: drop-shadow(0 12px 20px rgba(255,150,180,0.5)); }
.gift-box:active { transform: scale(0.95); }
#s6 p { color: #777; font-size: 1rem; font-weight: 600; }

/* ===== SCREEN 7 – CAKE / MAKE A WISH ===== */
#s7 {
background: radial-gradient(ellipse at center, #7b1fa2 0%, #4a0080 50%, #2d0050 100%);
flex-direction: column;
align-items: center;
justify-content: center;
padding: 20px;
overflow: hidden;
position: relative;
}
#s7 .sparkle {
position: fixed;
color: #fff;
pointer-events: none;
animation: sparklePulse 2.5s ease-in-out infinite;
user-select: none;
}
#s7 .sparkle:nth-child(1) { top: 20%; left: 7%; font-size: 28px; animation-delay: 1.1s; }
#s7 .sparkle:nth-child(2) { top: 20%; right: 10%; font-size: 36px; animation-delay: 0.9s; }
#s7 .sparkle:nth-child(3) { top: 65%; left: 5%; font-size: 20px; animation-delay: 0s; }
#s7 .sparkle:nth-child(4) { top: 80%; right: 7%; font-size: 18px; animation-delay: 0s; }
#s7 .sparkle:nth-child(5) { top: 8%; right: 28%; font-size: 14px; animation-delay: 0.9s; }
#s7 .sparkle:nth-child(6) { top: 82%; left: 22%; font-size: 12px; animation-delay: 1.1s; }

@keyframes sparklePulse {
0%,100% { transform: scale(1) rotate(0deg); opacity: 0.7; }
50% { transform: scale(1.5) rotate(15deg); opacity: 1; }
}

#s7 .wish-text {
font-family: 'Pacifico', cursive;
font-size: clamp(2rem, 6vw, 3.2rem);
color: #ffffff;
text-shadow: 0 2px 24px rgba(255,255,255,0.25);
text-align: center;
letter-spacing: 2px;
margin-bottom: 12px;
z-index: 10;
transition: all 0.5s ease;
padding: 0 12px;
}

#s7 .wish-text.celebrate {
font-size: clamp(1.5rem, 4.5vw, 2.6rem);
color: #ffd700;
text-shadow: 0 0 16px #ff8800, 0 0 40px #ffd700;
animation: celebratePulse 0.9s ease-in-out infinite alternate;
}

@keyframes celebratePulse {
from { transform: scale(1) rotate(-0.5deg); }
to { transform: scale(1.05) rotate(0.5deg); }
}

#s7 .scene {
position: relative;
width: min(400px, 85vw);
display: flex;
flex-direction: column;
align-items: center;
}

#s7 .cake-wrapper {
position: relative;
width: 100%;
}

#s7 .cake-img {
width: 100%;
height: auto;
display: block;
position: relative;
z-index: 2;
filter: drop-shadow(0 10px 36px rgba(80,0,120,0.8));
}

#s7 .flames-row {
position: absolute;
bottom: 72%;
left: 50%;
transform: translateX(-50%);
display: flex;
align-items: flex-end;
gap: 18px;
z-index: 10;
pointer-events: none;
}

#s7 .candle-slot {
display: flex;
flex-direction: column;
align-items: center;
position: relative;
}

#s7 .flame {
width: clamp(14px, 3.2vw, 20px);
height: clamp(24px, 4.5vw, 32px);
position: relative;
transform-origin: bottom center;
animation: flicker 0.6s ease-in-out infinite alternate;
flex-shrink: 0;
}

#s7 .flame::before {
content: '';
position: absolute;
inset: 0;
background: radial-gradient(ellipse at 50% 85%,
#ffffff 0%,
#ffe566 15%,
#ff9900 45%,
#ff3300 75%,
transparent 100%
);
border-radius: 50% 50% 35% 35% / 55% 55% 45% 45%;
filter: blur(1px);
}

#s7 .flame::after {
content: '';
position: absolute;
top: 25%; left: 18%; right: 18%; bottom: 18%;
background: radial-gradient(ellipse at 50% 60%, #fff 0%, #fffde0 50%, transparent 100%);
border-radius: 50% 50% 30% 30% / 60% 60% 40% 40%;
filter: blur(0.4px);
}

#s7 .flame-glow {
position: absolute;
top: -6px; left: 50%;
transform: translateX(-50%);
width: clamp(26px, 5.5vw, 36px);
height: clamp(26px, 5.5vw, 36px);
border-radius: 50%;
background: radial-gradient(circle, rgba(255,170,0,0.6) 0%, transparent 70%);
animation: glowPulse 0.6s ease-in-out infinite alternate;
pointer-events: none;
}

@keyframes flicker {
0% { transform: scaleX(1) scaleY(1) rotate(-3deg); }
20% { transform: scaleX(0.86) scaleY(1.08) rotate(2deg); }
45% { transform: scaleX(1.1) scaleY(0.93) rotate(-2deg); }
70% { transform: scaleX(0.92) scaleY(1.1) rotate(3deg); }
100% { transform: scaleX(1) scaleY(1) rotate(-1deg); }
}

@keyframes glowPulse {
from { opacity: 0.5; transform: translateX(-50%) scale(1); }
to { opacity: 1; transform: translateX(-50%) scale(1.4); }
}

#s7 .flame.out { display: none; }

#s7 .smoke {
position: absolute;
top: -4px; left: 50%;
transform: translateX(-50%);
width: 5px; height: 5px;
border-radius: 50%;
background: rgba(210,210,210,0.75);
opacity: 0;
pointer-events: none;
}
#s7 .smoke.puff {
animation: smokePuff 1.5s ease-out forwards;
}
@keyframes smokePuff {
0% { opacity: 0.8; transform: translateX(-50%) translateY(0) scale(1); }
55% { opacity: 0.4; transform: translateX(-50%) translateY(-25px) scale(2.5); }
100% { opacity: 0; transform: translateX(-50%) translateY(-55px) scale(4); }
}

#s7 .blow-btn-wrap {
position: absolute;
bottom: 26%;
left: 50%;
transform: translateX(-50%);
z-index: 20;
}

#s7 .jumping-man-track {
position: absolute;
left: 50%;
bottom: 4%;
width: min(520px, 120vw);
height: clamp(82px, 20vw, 132px);
transform: translateX(-50%);
overflow: hidden;
pointer-events: none;
z-index: 16;
}

#s7 .jumping-man-video {
position: absolute;
right: 0;
bottom: 0;
width: clamp(86px, 23vw, 132px);
height: auto;
object-fit: contain;
mix-blend-mode: screen;
filter: drop-shadow(0 10px 18px rgba(0,0,0,0.35));
animation: s7JumpAcross 4.8s linear infinite;
}

@keyframes s7JumpAcross {
from { transform: translateX(120%); }
to { transform: translateX(-460%); }
}

#s7 .btn-blow {
padding: 11px 44px;
background: rgba(20,0,50,0.85);
color: #fff;
border: 2px solid rgba(255,255,255,0.4);
border-radius: 50px;
font-family: 'Nunito', sans-serif;
font-size: clamp(0.9rem, 2.5vw, 1.1rem);
font-weight: 900;
letter-spacing: 4px;
cursor: pointer;
box-shadow: 0 4px 20px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.08);
transition: all 0.2s ease;
text-transform: uppercase;
backdrop-filter: blur(8px);
white-space: nowrap;
}
#s7 .btn-blow:hover:not(:disabled) {
background: rgba(60,0,100,0.9);
transform: scale(1.08);
box-shadow: 0 8px 30px rgba(0,0,0,0.65);
}
#s7 .btn-blow:active:not(:disabled) { transform: scale(0.96); }
#s7 .btn-blow:disabled {
opacity: 0;
pointer-events: none;
transition: opacity 0.4s ease;
}

#s7 .btn-back {
margin-top: 20px;
padding: 10px 30px;
background: transparent;
color: rgba(255,255,255,0.65);
border: 1.5px solid rgba(255,255,255,0.3);
border-radius: 50px;
font-family: 'Nunito', sans-serif;
font-size: 0.88rem;
font-weight: 700;
letter-spacing: 1px;
cursor: pointer;
transition: all 0.2s ease;
z-index: 10;
}
#s7 .btn-back:hover {
background: rgba(255,255,255,0.1);
color: #fff;
border-color: rgba(255,255,255,0.6);
transform: translateY(-2px);
}

.confetti-piece {
position: fixed;
top: -14px;
pointer-events: none;
z-index: 999;
animation: confettiFall linear forwards;
}
@keyframes confettiFall {
0% { transform: translateY(0) rotate(0deg); opacity: 1; }
100% { transform: translateY(110vh) rotate(760deg); opacity: 0; }
}

/* ===== SCREEN 8 – LOVE LETTER ===== */
#s8 {
background: #addbff;
flex-direction: column;
align-items: center;
justify-content: center;
padding: 30px 30px calc(30px + var(--safe-bottom));
position: relative;
overflow: hidden;
}
#s8 .s8-brand {
position: absolute;
right: 90px;
top: 50%;
transform: translateY(-50%);
font-family: 'Nunito', sans-serif;
font-size: 18px;
font-weight: 700;
color: #ffffff;
opacity: 0.95;
}
#s8 .s8-page-wrapper {
display: flex;
align-items: center;
justify-content: center;
gap: 34px;
width: min(100%, 760px);
transform: translateY(40px);
animation: s8RiseUp 0.8s ease forwards;
}
@keyframes s8RiseUp {
from { opacity: 0; transform: translateY(110px); }
to { opacity: 1; transform: translateY(0); }
}
#s8 .s8-photo-strip {
width: 132px;
background: #fff;
padding: 8px 8px 0;
display: flex;
flex-direction: column;
gap: 7px;
transform: rotate(-7deg);
box-shadow: 0 8px 22px rgba(0,0,0,0.28);
position: relative;
margin-top: 30px;
}
#s8 .s8-photo-slot {
width: 116px;
height: 95px;
background: #d9d9d9;
overflow: hidden;
position: relative;
}
#s8 .s8-photo-slot img {
width: 100%;
height: 100%;
object-fit: cover;
display: none;
}
#s8 .s8-photo-slot.has-img img { display: block; }
#s8 .s8-photo-slot.p1 { background: linear-gradient(135deg, #c79b7b, #f5d7c8); }
#s8 .s8-photo-slot.p2 { background: linear-gradient(135deg, #7f9f7c, #f0c9b8); }
#s8 .s8-photo-slot.p3 { background: linear-gradient(135deg, #1d3f7a, #6fd0b5, #d8f3ff); }
#s8 .s8-photo-slot input[type="file"] {
position: absolute;
inset: 0;
opacity: 0;
cursor: pointer;
z-index: 2;
}
#s8 .s8-add-icon {
position: absolute;
inset: 0;
display: flex;
align-items: center;
justify-content: center;
font-size: 28px;
color: rgba(0,0,0,0.25);
pointer-events: none;
}
#s8 .s8-photo-slot.has-img .s8-add-icon { display: none; }
#s8 .s8-strip-label {
text-align: right;
font-family: 'Nunito', sans-serif;
font-size: 18px;
font-weight: 800;
color: #1840d8;
padding: 4px 0 8px;
letter-spacing: 1px;
}
#s8 .s8-strip-label span { color: #2b5adf; }
#s8 .s8-envelope-area {
width: 360px;
position: relative;
display: flex;
flex-direction: column;
align-items: center;
}
#s8 .s8-top-decor {
position: relative;
width: 100%;
height: 70px;
margin-bottom: -8px;
}
#s8 .s8-speech-bubble {
position: absolute;
left: 35px;
top: 0;
background: #ffffff;
color: #474747;
border-radius: 12px;
padding: 3px 12px;
font-family: 'Nunito', sans-serif;
font-size: 12px;
font-weight: 700;
box-shadow: 0 2px 8px rgba(0,0,0,0.12);
}
#s8 .s8-speech-bubble::after {
content: "";
position: absolute;
left: 18px;
bottom: -7px;
border: 7px solid transparent;
border-top-color: #ffffff;
}
#s8 .s8-hearts-row {
position: absolute;
left: 62px;
top: 28px;
background: #ffffff;
padding: 2px 10px;
border-radius: 12px;
font-size: 12px;
letter-spacing: 2px;
color: #4860df;
box-shadow: 0 2px 8px rgba(0,0,0,0.12);
font-family: 'Nunito', sans-serif;
}
#s8 .s8-stamp {
position: absolute;
right: 42px;
top: 10px;
width: 56px;
height: 42px;
background: #d8b089;
border: 2px dashed #f5e4d4;
box-shadow: 0 3px 10px rgba(0,0,0,0.18);
display: flex;
align-items: center;
justify-content: center;
font-size: 18px;
transform: rotate(-2deg);
}
#s8 .s8-letter {
position: absolute;
top: 65px;
left: 50%;
transform: translateX(-60%) rotate(7deg);
width: 170px;
min-height: 210px;
background: #fff;
z-index: 5;
box-shadow: 0 8px 22px rgba(0,0,0,0.18);
padding: 18px 14px;
text-align: center;
color: #222;
font-size: 13px;
line-height: 1.4;
max-height: 230px;
overflow: auto;
-webkit-overflow-scrolling: touch;
}
#s8 .s8-envelope {
position: relative;
width: 290px;
height: 205px;
margin-top: 70px;
background: linear-gradient(135deg, #65a8ff, #2d7df3);
border-radius: 0 0 8px 8px;
box-shadow: 0 12px 30px rgba(0,0,0,0.22);
overflow: hidden;
}
#s8 .s8-back-flap {
position: absolute;
top: 0;
left: 0;
width: 100%;
height: 120px;
background: linear-gradient(135deg, #7eb9ff, #4a97ff);
clip-path: polygon(0 0, 50% 72%, 100% 0);
z-index: 1;
}
#s8 .s8-left-fold {
position: absolute;
left: 0;
bottom: 0;
width: 50%;
height: 100%;
background: rgba(255,255,255,0.08);
clip-path: polygon(0 0, 100% 100%, 0 100%);
z-index: 3;
}
#s8 .s8-right-fold {
position: absolute;
right: 0;
bottom: 0;
width: 50%;
height: 100%;
background: rgba(255,255,255,0.1);
clip-path: polygon(100% 0, 100% 100%, 0 100%);
z-index: 3;
}
#s8 .s8-front-flap {
position: absolute;
left: 0;
bottom: 0;
width: 100%;
height: 120px;
background: linear-gradient(135deg, #5fa6ff, #3e8df8);
clip-path: polygon(0 100%, 50% 20%, 100% 100%);
z-index: 4;
}
#s8 .s8-heart-seal {
position: absolute;
left: 50%;
bottom: 34px;
transform: translateX(-50%);
width: 62px;
height: 52px;
background: #ff1648;
transform-origin: center;
z-index: 6;
clip-path: path("M 29 50 C 8 35 0 25 0 14 C 0 5 7 0 14 0 C 20 0 25 4 29 10 C 33 4 38 0 44 0 C 51 0 58 5 58 14 C 58 25 50 35 29 50 Z");
filter: drop-shadow(0 3px 6px rgba(0,0,0,0.25));
}
#s8 .s8-back-btn {
position: absolute;
right: 115px;
bottom: 48px;
background: #000;
